<section class="login-card">
  <div class="login-cabecalho">
    <span class="login-icone">Jogo da velha</span>
    <h1>Bem-vindo</h1>
    <p>Entre com seus dados para continuar.</p>
  </div>

  <form class="login-formulario" action="" method="post">
    <div class="campo">
      <label for="email">Nome de usuário</label>
      <input type="text" id="email" name="email" placeholder="Digite seu email" autocomplete="username" required>
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <div class="campo-senha">
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
        <button class="botao-mostrar-senha" type="button" aria-label="Mostrar senha">Mostrar</button>
      </div>
    </div>

    <span class="mensagem-erro" aria-live="polite"></span>
    <button class="botao-login" type="submit">Entrar</button>
  </form>

  <div class="cadastro">
    <span>Ainda não possui uma conta?</span>
    <a class="botao-cadastro" href="/cadastro">Criar conta</a>
  </div>
</section>
