<header class="cabecalho">
        <button class="botao-sair" type="button">Sair</button>
      </header>

      <main class="conteudo-principal">
        <section class="coluna-acoes">
          <button class="botao-acao botao-criar-sala" type="button">
            Criar sala
          </button>

          <button class="botao-acao botao-sala-privada" type="button">
            Entrar em sala privada
          </button>
        </section>

        <section class="coluna-conteudo" aria-label="Conteúdo da sala"></section>
</main>

<dialog id="modal-sair">
  <div class="modal-conteudo">
    <h2>Deseja sair?</h2>

    <p>Você precisará entrar novamente para acessar sua conta.</p>

    <div class="modal-botoes">
      <button id="cancelar-saida">Cancelar</button>
      <button id="confirmar-saida">Sair</button>
    </div>
  </div>
</dialog>
